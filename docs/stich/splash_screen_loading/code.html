<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#adc6ff",
                        "primary-fixed-dim": "#c6bfff",
                        "on-tertiary-container": "#f6f6ff",
                        "surface-tint": "#c6bfff",
                        "error": "#ffb4ab",
                        "outline-variant": "#474554",
                        "on-primary-fixed": "#160066",
                        "surface-variant": "#35343a",
                        "primary-fixed": "#e4dfff",
                        "inverse-on-surface": "#303036",
                        "on-error-container": "#ffdad6",
                        "surface-bright": "#39383e",
                        "secondary-container": "#00d19f",
                        "on-primary-fixed-variant": "#4029ba",
                        "surface-container-low": "#1b1b20",
                        "tertiary-fixed": "#d8e2ff",
                        "on-tertiary": "#002e6a",
                        "surface-container-lowest": "#0e0e13",
                        "surface-container-highest": "#35343a",
                        "surface-container-high": "#2a292f",
                        "on-error": "#690005",
                        "secondary-fixed": "#57fdc8",
                        "on-secondary-fixed": "#002116",
                        "error-container": "#93000a",
                        "primary": "#c6bfff",
                        "outline": "#928ea0",
                        "inverse-surface": "#e4e1e9",
                        "on-tertiary-fixed": "#001a42",
                        "surface-dim": "#131318",
                        "surface-container": "#1f1f25",
                        "primary-container": "#6c5ce7",
                        "on-secondary-container": "#00543e",
                        "on-primary": "#2900a0",
                        "tertiary-container": "#1a6de0",
                        "on-primary-container": "#faf6ff",
                        "on-background": "#e4e1e9",
                        "on-secondary-fixed-variant": "#00513c",
                        "secondary": "#44eeba",
                        "on-surface": "#e4e1e9",
                        "surface": "#131318",
                        "on-surface-variant": "#c8c4d7",
                        "on-secondary": "#003828",
                        "background": "#131318",
                        "tertiary-fixed-dim": "#adc6ff",
                        "inverse-primary": "#5847d2",
                        "secondary-fixed-dim": "#2ce0ad",
                        "on-tertiary-fixed-variant": "#004395"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0A0A0F;
            color: #E4E1E9;
            font-family: 'Inter', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .liquid-gradient {
            background: linear-gradient(135deg, #6C5CE7 0%, #00D2A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mic-glow {
            box-shadow: 0 0 60px -15px rgba(108, 92, 231, 0.3);
        }
        .glass-panel {
            background: rgba(19, 19, 24, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-screen w-full flex flex-col items-center justify-between p-8 overflow-hidden">
<!-- Top Navigation Anchor (Hidden for Splash) -->
<header class="hidden">
<h1 class="font-['Inter'] tracking-tight font-bold uppercase text-lg tracking-[0.2em] font-black text-[#E4E2EE]">LEXIS AI</h1>
</header>
<!-- Main Branding & Iconography -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-md">
<!-- Central Visualization Unit -->
<div class="relative mb-16 group">
<!-- Stylized Mic & Waveform Morph -->
<div class="w-32 h-32 md:w-40 md:h-40 flex items-center justify-center rounded-full bg-surface-container-lowest mic-glow border border-outline-variant/10 relative overflow-hidden">
<span class="material-symbols-outlined text-6xl md:text-7xl liquid-gradient" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                    mic
                </span>
<!-- Morphing Text Lines (Visual Representation) -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 left-0 w-full h-px bg-gradient-to-r from-transparent via-secondary to-transparent"></div>
<div class="absolute top-1/2 left-0 w-full h-px bg-gradient-to-r from-transparent via-primary to-transparent translate-y-2"></div>
<div class="absolute top-3/4 left-0 w-full h-px bg-gradient-to-r from-transparent via-secondary to-transparent -translate-y-2"></div>
</div>
</div>
<!-- Ambient Glow Element -->
<div class="absolute -inset-4 bg-primary/5 blur-3xl rounded-full -z-10"></div>
</div>
<!-- Typography Cluster -->
<div class="text-center space-y-4">
<h2 class="text-[24px] font-black tracking-tight text-on-surface">
                Meeting Voice Assistant
            </h2>
<div class="flex items-center justify-center space-x-3">
<div class="h-px w-4 bg-outline-variant/30"></div>
<p class="text-[14px] font-light tracking-[0.3em] text-on-surface-variant/70 uppercase">
                    UNDERSTAND EVERY VOICE
                </p>
<div class="h-px w-4 bg-outline-variant/30"></div>
</div>
</div>
</main>
<!-- Operational/Status Area -->
<footer class="w-full max-w-sm space-y-8 mb-4">
<!-- Technical Progress Indicator -->
<div class="space-y-4">
<div class="flex justify-between items-end">
<span class="mono text-[10px] text-secondary tracking-widest uppercase font-medium">
                    System.initialize(AI_MODEL_V4)
                </span>
<span class="mono text-[11px] text-on-surface-variant/80">
                    67%
                </span>
</div>
<div class="w-full h-[2px] bg-surface-container-highest relative overflow-hidden">
<!-- Progress Bar Core -->
<div class="absolute left-0 top-0 h-full bg-secondary w-2/3 shadow-[0_0_8px_rgba(68,238,186,0.5)]"></div>
</div>
<p class="mono text-[10px] text-center text-on-surface-variant/40 tracking-tight uppercase">
                LOADING AI MODEL... 67%
            </p>
</div>
<!-- System Metadata Footnote -->
<div class="flex flex-col items-center space-y-2 pt-4">
<div class="flex items-center space-x-2 text-on-surface-variant/30">
<span class="material-symbols-outlined text-[14px]" data-icon="terminal">terminal</span>
<span class="mono text-[10px] tracking-widest">
                    SenseVoice • EN / JA / KO
                </span>
</div>
<div class="h-1 w-1 rounded-full bg-outline-variant/20"></div>
</div>
</footer>
<!-- Decorative Background Elements -->
<div class="fixed inset-0 pointer-events-none -z-20">
<!-- Top Left Radial -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<!-- Bottom Right Radial -->
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full"></div>
<!-- Subtle Grid Texture -->
<div class="absolute inset-0 opacity-[0.02]" style="background-image: radial-gradient(#C8C4D7 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
</div>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Meeting Voice Assistant Splash</title>

                  "on-error-container": "#ffdad6",
                  "secondary": "#44eeba",
                  "on-secondary-fixed": "#002116",
                  "on-primary": "#2900a0",
                  "surface-container-low": "#1b1b20",
                  "inverse-on-surface": "#303036",
                  "on-tertiary-fixed": "#001a42",

                  "surface-variant": "#35343a",
                  "on-surface-variant": "#c8c4d7",
                  "tertiary-fixed-dim": "#adc6ff",
                  "primary-container": "#6c5ce7",
                  "on-secondary-fixed-variant": "#00513c",
                  "on-tertiary-fixed-variant": "#004395",
                  "outline": "#928ea0",
                  "surface-dim": "#131318",
                  "on-tertiary-container": "#f6f6ff",
                  "inverse-primary": "#5847d2",
                  "surface-bright": "#39383e",
                  "outline-variant": "#474554",
                  "error": "#ffb4ab",
                  "secondary-fixed-dim": "#2ce0ad",

          "borderRadius": {
                  "DEFAULT": "0.125rem",

          "fontFamily": {
                  "headline": ["Inter"],
                  "body": ["Inter"],

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #0A0A0F;
      color: #E4E1E9;
    }
    .gradient-mask {
      background: linear-gradient(135deg, #6C5CE7 0%, #00D19F 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glow-effect {
      box-shadow: 0 0 40px rgba(108, 92, 231, 0.15);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen font-body antialiased selection:bg-primary/30 overflow-hidden">
<!-- Main Splash Content -->
<main class="flex-grow flex flex-col items-center justify-center relative px-8">
<!-- Abstract Background Ambient Glow -->
<div class="absolute inset-0 z-0">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Centered Logo Section -->
<div class="z-10 flex flex-col items-center text-center space-y-8">
<!-- Stylized Icon Container -->
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Outer Glowing Ring -->
<div class="absolute inset-0 rounded-full border border-outline-variant/10 glow-effect"></div>
<!-- Morphing Icon Representation -->
<div class="flex items-end gap-1 mb-2 h-16">
<div class="w-1.5 h-6 bg-primary-container rounded-full"></div>
<div class="w-1.5 h-10 bg-primary rounded-full"></div>
<!-- Centered Mic -->
<div class="relative group">
<span class="material-symbols-outlined text-6xl gradient-mask" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="w-1.5 h-10 bg-secondary-container rounded-full"></div>
<div class="w-1.5 h-6 bg-secondary rounded-full"></div>
</div>
<!-- Text Line Morph Overlay (Subtle) -->
<div class="absolute bottom-4 flex flex-col gap-1 w-12 opacity-40">
<div class="h-0.5 w-full bg-on-surface-variant rounded-full"></div>
<div class="h-0.5 w-3/4 bg-on-surface-variant rounded-full self-center"></div>
</div>
</div>
<!-- App Name & Tagline -->
<div class="space-y-2">
<h1 class="text-[24px] font-bold tracking-tight text-on-surface">Meeting Voice Assistant</h1>
<p class="text-[14px] font-normal text-on-surface-variant/60 tracking-wide uppercase">Understand every voice</p>
</div>
</div>
</main>
<!-- Progress & System Info Footer -->
<footer class="w-full max-w-xs mx-auto pb-16 px-6 space-y-6 z-10">
<!-- Loading AI Model Status -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<span class="font-label text-[10px] tracking-[0.2em] text-secondary uppercase">Loading AI model...</span>
<span class="font-label text-[10px] text-on-surface-variant/50">67%</span>
</div>
<!-- Precision Progress Bar -->
<div class="w-full h-[2px] bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary-container w-[67%] shadow-[0_0_8px_rgba(0,209,159,0.4)]"></div>
</div>
</div>
<!-- Technical Metadata -->
<div class="flex justify-center">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-low rounded-full border border-outline-variant/5">
<span class="material-symbols-outlined text-xs text-secondary/70" data-icon="memory">memory</span>
<span class="font-label text-[10px] text-on-surface-variant/40 tracking-tighter">SenseVoice • EN / JA / KO</span>
</div>
</div>
</footer>
<!-- Subtle Texture Overlay -->
<div class="pointer-events-none fixed inset-0 z-50 opacity-[0.03] mix-blend-overlay" data-alt="subtle dark carbon fiber texture for a premium technical feel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC7lNhT9F09OFhfOqUoRu8LlBg8dDNEF1BxER1w1tfNcltVwfvO2iSEG-u5s67Z9zMVALfz_lqGB2vx6Bgyh5qjl8CsJ7bQWmd_8YzZOXTLeO_NFmh5MzwRytKLYDvjX7Z5Vy0PIzJi4FvYLaSAmTFA5qo4LjmOud5L_UzFSqmT9pG3oGb67wovivmUWQxzxaNal9zEqbG5HNXPuLhwNy42w1UpM41bdRlENgclOyoQg7XM8PHJ2vTVKSfWPiuSuGp62CrLWSt7420');"></div>
</body></html>
